# Build Tartelet.app and attach Tartelet.zip to tagged releases.
# Holoplot mac hosts install from holoplot/tartelet releases via Ansible.
#
# Configure repository secrets (Settings → Secrets → Actions):
#   APPLE_CERTIFICATE_P12       — base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD  — export password for the .p12
#   APPLE_TEAM_ID               — 10-character Apple Developer team ID
#   APPLE_ID                    — Apple ID email for notarization
#   APPLE_APP_SPECIFIC_PASSWORD — app-specific password (or use ASC API key below)
#
# Optional (preferred over Apple ID password):
#   APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_KEY_P8 (base64)
#
# Create environment "apple-signing" with required reviewers before first release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    environment: apple-signing
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen swiftgen

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Generate Xcode project
        run: |
          xcodegen generate
          if ! swiftgen; then
            test -f Packages/Settings/Sources/SettingsUI/Internal/Assets.swift
            test -f Packages/MenuBar/Sources/MenuBar/Internal/L10n.swift
          fi

      - name: Build Tartelet
        run: |
          set -euo pipefail
          xcodebuild \
            -scheme Tartelet \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "platform=macOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            build
          app="DerivedData/Build/Products/Release/Tartelet.app"
          test -d "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" Tartelet-unsigned.zip

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          app="DerivedData/Build/Products/Release/Tartelet.app"

          if [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER_ID:-}" ] && [ -n "${APPLE_API_KEY_P8:-}" ]; then
            key_file="$(mktemp)"
            printf '%s' "$APPLE_API_KEY_P8" | base64 -d > "$key_file"
            xcrun notarytool store-credentials holoplot-notary \
              --key "$key_file" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID"
            rm -f "$key_file"
            notary_profile="holoplot-notary"
          else
            xcrun notarytool store-credentials holoplot-notary \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"
            notary_profile="holoplot-notary"
          fi

          ditto -c -k --sequesterRsrc --keepParent "$app" Tartelet-submit.zip
          xcrun notarytool submit Tartelet-submit.zip \
            --keychain-profile "$notary_profile" \
            --wait
          xcrun stapler staple "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" Tartelet.zip
          spctl -a -vv "$app" || true

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Tartelet.zip
