# Build Tartelet.app and attach Tartelet.zip to tagged releases.
# Holoplot mac hosts install from holoplot/tartelet releases via Ansible.
#
# Uses Holoplot org secrets (same names as sw__holocloud / holoforge-release):
#   DEVELOPERID_APPLICATION_P12_BASE64  — Developer ID Application .p12 (base64)
#   DEVELOPERID_APPLICATION_P12_PSW     — .p12 export password
#   APPLE_NOTARIZE_ISSUER_ID            — App Store Connect API issuer UUID
#   APPLE_NOTARIZE_KEY_ID               — App Store Connect API key ID
#   APPLE_NOTARIZE_KEY_P8_BASE64        — base64-encoded .p8 private key
#
# Optional password-based notarization fallback:
#   APPLE_ID, APPLE_NOTARIZATION_PASSWORD
#
# Grant this repository access to the org secrets (Settings → Secrets →
# Organization secrets → Repository access). Create environment "apple-signing"
# with required reviewers before the first release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    environment: apple-signing
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen swiftgen

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPERID_APPLICATION_P12_BASE64 }}
          p12-password: ${{ secrets.DEVELOPERID_APPLICATION_P12_PSW }}

      - name: Generate Xcode project
        run: |
          xcodegen generate
          if ! swiftgen; then
            test -f Packages/Settings/Sources/SettingsUI/Internal/Assets.swift
            test -f Packages/MenuBar/Sources/MenuBar/Internal/L10n.swift
          fi

      - name: Build Tartelet
        env:
          DEVELOPERID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPERID_APPLICATION_P12_BASE64 }}
          DEVELOPERID_APPLICATION_P12_PSW: ${{ secrets.DEVELOPERID_APPLICATION_P12_PSW }}
        run: |
          set -euo pipefail
          p12="$(mktemp)"
          printf '%s' "$DEVELOPERID_APPLICATION_P12_BASE64" | base64 -d > "$p12"
          team_id="$(
            openssl pkcs12 -in "$p12" -passin "pass:${DEVELOPERID_APPLICATION_P12_PSW}" -nodes -nokeys 2>/dev/null \
              | openssl x509 -noout -subject \
              | sed -n 's/.*OU=\([^/]*\).*/\1/p'
          )"
          rm -f "$p12"
          if [ -z "$team_id" ]; then
            echo "error: could not extract Apple team ID from Developer ID certificate" >&2
            exit 1
          fi
          echo "Using DEVELOPMENT_TEAM=$team_id"
          xcodebuild \
            -scheme Tartelet \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "platform=macOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$team_id" \
            build
          app="DerivedData/Build/Products/Release/Tartelet.app"
          test -d "$app"
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZE_ISSUER_ID: ${{ secrets.APPLE_NOTARIZE_ISSUER_ID }}
          APPLE_NOTARIZE_KEY_ID: ${{ secrets.APPLE_NOTARIZE_KEY_ID }}
          APPLE_NOTARIZE_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARIZE_KEY_P8_BASE64 }}
          DEVELOPERID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPERID_APPLICATION_P12_BASE64 }}
          DEVELOPERID_APPLICATION_P12_PSW: ${{ secrets.DEVELOPERID_APPLICATION_P12_PSW }}
        run: |
          set -euo pipefail
          app="DerivedData/Build/Products/Release/Tartelet.app"

          if [ -n "${APPLE_NOTARIZE_KEY_ID:-}" ] && [ -n "${APPLE_NOTARIZE_ISSUER_ID:-}" ] && [ -n "${APPLE_NOTARIZE_KEY_P8_BASE64:-}" ]; then
            key_file="$(mktemp)"
            printf '%s' "$APPLE_NOTARIZE_KEY_P8_BASE64" | base64 -d > "$key_file"
            xcrun notarytool store-credentials holoplot-notary \
              --key "$key_file" \
              --key-id "$APPLE_NOTARIZE_KEY_ID" \
              --issuer "$APPLE_NOTARIZE_ISSUER_ID"
            rm -f "$key_file"
            notary_profile="holoplot-notary"
          elif [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_NOTARIZATION_PASSWORD:-}" ]; then
            p12="$(mktemp)"
            printf '%s' "$DEVELOPERID_APPLICATION_P12_BASE64" | base64 -d > "$p12"
            team_id="$(
              openssl pkcs12 -in "$p12" -passin "pass:${DEVELOPERID_APPLICATION_P12_PSW}" -nodes -nokeys 2>/dev/null \
                | openssl x509 -noout -subject \
                | sed -n 's/.*OU=\([^/]*\).*/\1/p'
            )"
            rm -f "$p12"
            xcrun notarytool store-credentials holoplot-notary \
              --apple-id "$APPLE_ID" \
              --team-id "$team_id" \
              --password "$APPLE_NOTARIZATION_PASSWORD"
            notary_profile="holoplot-notary"
          else
            echo "error: set APPLE_NOTARIZE_* API key secrets or APPLE_ID + APPLE_NOTARIZATION_PASSWORD" >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$app" Tartelet-submit.zip
          xcrun notarytool submit Tartelet-submit.zip \
            --keychain-profile "$notary_profile" \
            --wait
          xcrun stapler staple "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" Tartelet.zip
          spctl -a -vv "$app" || true

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Tartelet.zip
